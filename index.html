<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furniture Assembly Request</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1e1e1e; 
            color: #fff; 
            padding: 20px; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        form { 
            background: #2d2d2d;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 400px; 
            width: 100%;
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        h3 {
            margin-top: 0;
            margin-bottom: 10px;
            text-align: center;
            color: #0076ff;
        }
        input, textarea, button { 
            padding: 12px; 
            border-radius: 5px; 
            border: 1px solid #444; 
            background-color: #1e1e1e; 
            color: #fff; 
            font-size: 14px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #0076ff;
        }
        button { 
            background-color: #0076ff; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background 0.2s ease;
            margin-top: 5px;
        }
        button:hover { 
            background-color: #005bc5; 
        }
        #result { 
            text-align: center; 
            font-weight: bold; 
            min-height: 20px;
        }
    </style>
</head>
<body>

    <form id="web3-form">
        <input type="hidden" name="access_key" value="1255fc58-2cfc-4254-848a-9dc970317152">
        <input type="hidden" name="subject" value="New Furniture Assembly Request">
        <input type="checkbox" name="botcheck" style="display: none;">

        <h3>Request Furniture Assembly</h3>
        
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="tel" name="phone" placeholder="Phone Number" required>
        <textarea name="details" placeholder="What needs to be assembled? (e.g., IKEA wardrobe, bed)" rows="4" required></textarea>
        
        <button type="submit">Submit Request</button>
        <div id="result"></div>
    </form>

    <script>
        const form = document.getElementById('web3-form');
        const result = document.getElementById('result');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(form);
            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);
            
            result.innerHTML = "Sending...";
            result.style.color = "#fff";

            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: json
            })
            .then(async (response) => {
                let json = await response.json();
                if (response.status == 200) {
                    result.style.color = "lightgreen";
                    result.innerHTML = "Success! Request sent.";
                    form.reset(); // Очищаем поля формы
                } else {
                    console.log(response);
                    result.style.color = "red";
                    result.innerHTML = json.message;
                }
            })
            .catch(error => {
                console.log(error);
                result.style.color = "red";
                result.innerHTML = "Something went wrong!";
            });
        });
    </script>

</body>
</html>
