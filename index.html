<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furniture Assembly Request</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 50px; 
            background-color: #f4f4f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 80vh; 
        }
        form { 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        h3 { margin-top: 0; margin-bottom: 20px; color: #333; font-size: 22px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #555; font-size: 14px; }
        input, textarea, button { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 14px; 
        }
        input:focus, textarea:focus { border-color: #25d366; outline: none; }
        button { 
            background-color: #25d366; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            margin-bottom: 0;
            transition: background 0.2s;
        }
        button:hover { background-color: #1ebd56; }
    </style>
</head>
<body>

    <form action="https://api.web3forms.com/submit" method="POST">
        
        <input type="hidden" name="access_key" value="1255fc58-2cfc-4254-848a-9dc970317152">
        
        <input type="hidden" name="subject" value="🛠️ New Furniture Assembly Request!">

        <h3>Request a Service</h3>
        
        <label for="name">Your Name:</label>
        <input type="text" id="name" name="Client Name" placeholder="John Doe" required>
        
        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="Phone Number" placeholder="+1 (555) 000-0000" required>
        
        <label for="message">Project Details:</label>
        <textarea id="message" name="Project Details" placeholder="e.g., IKEA wardrobe, chest of drawers, bed assembly" rows="4" required></textarea>
        
        <button type="submit">Submit Request</button>
        
    </form>

</body>
</html>
