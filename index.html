<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест Telegram Формы</title>
</head>
<body>

    <h2>Тест отправки в Telegram</h2>
    
    <form id="tg-form">
        <input type="text" id="name" placeholder="Твое имя" required><br><br>
        <button type="submit">Отправить тест</button>
    </form>

    <script>
    // === ВСТАВЬ СВОИ ДАННЫЕ СЮДА ===
    const TOKEN = "6106855993:AAEYxRIOggTc2Zp7xTGx5-Ldv-rg4LYzZGc"; 
    const CHAT_ID = "@Misha_test3248bot"; 
    // ===============================

    const URI_API = `https://api.telegram.org/bot${ 6106855993:AAEYxRIOggTc2Zp7xTGx5-Ldv-rg4LYzZGc }/sendMessage`;

    document.getElementById('tg-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        const message = `<b>Тест прошел успешно!</b>\nПривет, это проверка от ${name}`;
        
        fetch(URI_API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                parse_mode: 'html',
                text: message
            })
        })
        .then(response => {
            if (response.ok) {
                alert('Ура! Сообщение улетело в Telegram!');
            } else {
                alert('Что-то пошло не так. Проверь токен и ID.');
            }
        })
        .catch(err => console.error(err));
    });
    </script>

</body>
</html>
