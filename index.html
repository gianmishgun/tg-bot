<script>
    // Твой токен я уже вставил сам:
    const TOKEN = "6106855993:AAEYxRIOggTc2Zp7xTGx5-Ldv-rg4LYzZGc"; 
    
    // СЮДА вместо 123456789 впиши цифры своего ID от @userinfobot:
    const CHAT_ID = "341983378"; 

    const URI_API = `https://api.telegram.org/bot${TOKEN}/sendMessage`;

    document.getElementById('tg-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const details = document.getElementById('details').value;
        
        let message = `<b>🛠️ Новая заявка на сборку!</b>\n\n`;
        message += `<b>Клиент:</b> ${name}\n`;
        message += `<b>Телефон:</b> ${phone}\n`;
        message += `<b>Что собрать:</b> ${details}`;
        
        fetch(URI_API, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                parse_mode: 'html',
                text: message
            })
        })
        .then(response => {
            if (response.ok) {
                alert('Заявка успешно отправлена!');
                document.getElementById('tg-form').reset();
            } else {
                alert('Ошибка при отправке. Проверь свой CHAT_ID и нажал ли ты /start в боте.');
            }
        })
        .catch(error => {
            console.error('Ошибка:', error);
            alert('Не удалось связаться с сервером Telegram.');
        });
    });
</script>
